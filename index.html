      name="twitter:description"
      content="Pick an element, screenshot, annotate. Feedback lands in a local folder as clean artifacts that a coding agent reads and fixes."

  <body>
    <!--
      Static pre-render: crawlers and link-preview bots get meaningful hero text
      and nav before the JS bundle runs. React client-renders into #root and
      replaces this placeholder on mount.
    -->
    <div id="root">
      <header
        class="border-[var(--color-line)] border-b"
        data-prerender="true"
      >
        <div class="mx-auto flex max-w-5xl items-center justify-between px-6 py-3">
          <span class="inline-flex items-center gap-2 font-semibold tracking-tight">
            <img
              alt=""
              class="h-7 w-7"
              height="28"
              width="28"
              src="/icon.svg"
            />
            sluglist
          </span>
          <nav class="flex items-center gap-5 text-[14px] text-[var(--color-muted)]">
            <a href="#agents">Agents</a>
            <a href="#demo">Demo</a>
            <a href="#start">Docs</a>
          </nav>
        </div>
      </header>
      <main class="mx-auto max-w-5xl px-6 pt-20 pb-16 text-center">
        <h1 class="mx-auto max-w-3xl font-bold text-4xl tracking-tight md:text-6xl">
          Visual feedback, one line in.
        </h1>
        <p class="mx-auto mt-5 max-w-xl text-[17px] text-[var(--color-ink-2)]">
          A drop-in widget for dev and staging sites. Pick an element,
          screenshot, annotate, and deliver clean artifacts through your own
          connectors — or let Claude Code read the feedback and fix it.
        </p>
        <p class="mx-auto mt-8 max-w-md font-mono text-[14px] text-[var(--color-muted)]">
          $ npm install sluglist
        </p>
      </main>
    </div>
  </body>
</html>
