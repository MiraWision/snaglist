<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>sluglist — frame timing</title>
    <style>
      body { font-family: -apple-system, system-ui, sans-serif; margin: 0; color: #18181b; }
      header { display: flex; gap: 16px; padding: 16px 24px; border-bottom: 1px solid #e5e7eb; align-items: center; }
      nav a { margin-right: 14px; color: #374151; text-decoration: none; }
      main { max-width: 900px; margin: 24px auto; padding: 0 24px; }
      .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
      .card { border: 1px solid #e5e7eb; border-radius: 10px; padding: 14px; }
      .card h3 { margin: 0 0 6px; font-size: 15px; }
      .card p { margin: 0; color: #6b7280; font-size: 13px; }
      form { margin: 24px 0; display: grid; gap: 10px; max-width: 420px; }
      input, select { padding: 9px 11px; border: 1px solid #d1d5db; border-radius: 8px; }
      button.primary { padding: 10px 18px; border: none; border-radius: 8px; background: #18181b; color: #fff; }
    </style>
  </head>
  <body>
    <header>
      <strong>Acme Dashboard</strong>
      <nav><a href="#a">Animals</a><a href="#b">Breeding</a><a href="#c">Orders</a><a href="#d">Tests</a></nav>
    </header>
    <main>
      <h1>Animals</h1>
      <form id="f">
        <input id="name" placeholder="Name" />
        <input id="email" type="email" placeholder="Email" />
        <select><option>Gecko</option><option>Python</option></select>
        <button class="primary" type="button">Save</button>
      </form>
      <div class="grid" id="grid"></div>
    </main>
    <script src="../dist/sluglist.global.js"></script>
    <script>
      // ~60 cards → a realistically busy page
      const grid = document.getElementById("grid");
      for (let i = 0; i < 60; i++) {
        const c = document.createElement("div");
        c.className = "card";
        c.innerHTML = `<h3>Animal ${i + 1}</h3><p>Morph: albino · Weight: ${100 + i}g · Sex: female</p>`;
        grid.appendChild(c);
      }
      const core = Sluglist.createFeedbackWidget({ project: "acme", connectors: [new Sluglist.MemoryConnector()] });
      Sluglist.mountFeedbackWidget(core);

      window.measure = async (n = 6) => {
        const times = [];
        for (let i = 0; i < n; i++) {
          const t0 = performance.now();
          await Sluglist.captureFullPage();
          times.push(Math.round(performance.now() - t0));
        }
        times.sort((a, b) => a - b);
        return { runs: times, median: times[Math.floor(times.length / 2)], min: times[0], max: times.at(-1) };
      };
    </script>
  </body>
</html>
