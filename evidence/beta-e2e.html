<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>sluglist — beta preset E2E</title>
    <style>
      body { font-family: -apple-system, system-ui, sans-serif; margin: 24px; color: #111; }
      #target { max-width: 420px; border: 1px solid #e5e7eb; border-radius: 12px; padding: 20px; }
      .field { margin-bottom: 12px; }
      label { display: block; font-size: 12px; color: #6b7280; margin-bottom: 4px; }
      input { width: 100%; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 8px; }
      .note { margin-top: 8px; padding: 10px; background: #f3f4f6; border-radius: 8px; font-size: 13px; }
    </style>
  </head>
  <body>
    <h1>Beta preset E2E</h1>
    <div id="target">
      <div class="field"><label>Full name</label><input value="Anna Karlsson" /></div>
      <div class="field"><label>Email</label><input value="anna.karlsson@example.com" /></div>
      <div class="field"><label>Card number</label><input value="4242 4242 4242 4242" /></div>
      <div class="note" data-private>Internal note: VIP, churn risk</div>
    </div>

    <script src="../dist/sluglist.global.js"></script>
    <script>
      const memory = new Sluglist.MemoryConnector();
      const core = Sluglist.createFeedbackWidget({
        project: "acme",
        preset: "beta",
        connectors: [memory],
        identity: { userId: "u_18293", email: "anna.karlsson@example.com", name: "Anna K." },
        custom: { plan: "pro", appVersion: "2.4.1" },
      });
      const ui = Sluglist.mountFeedbackWidget(core);
      const shadow = document.querySelector("[data-feedback-widget]").shadowRoot;
      window.__core = core;
      window.__memory = memory;

      const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
      async function until(fn, timeout = 15000) {
        const t0 = Date.now();
        while (Date.now() - t0 < timeout) { if (fn()) return true; await sleep(100); }
        return false;
      }

      // Drive one issue through the real UI: open menu → full page → (consent) → comment → send.
      async function issue(comment, { consent = true } = {}) {
        shadow.querySelector(".fab").click();
        await until(() => shadow.querySelector(".menu").style.display === "flex");
        [...shadow.querySelectorAll(".menu button")][1].click(); // full page
        // wait for the pending capture to resolve into a real thumbnail
        await until(() => shadow.querySelector(".thumb:not(.thumb-pending)"));
        const consentBox = shadow.querySelector(".consent input");
        if (!consent && consentBox) consentBox.checked = false;
        const ta = shadow.querySelector("textarea");
        ta.value = comment;
        ta.dispatchEvent(new Event("input", { bubbles: true }));
        shadow.querySelector(".send").click();
        await until(() => core.getPendingDeliveries() === 0);
        return { consentVisible: !!consentBox };
      }

      window.runE2E = async () => {
        const betaLabel = shadow.querySelector(".fab-label").textContent;
        const i1 = await issue("Header overlaps nav on mobile");
        const i2 = await issue("Save button spins forever");
        const i3 = await issue("Typo on the pricing page", { consent: false });

        const sessionId = core.getSession().session_id;
        const files = memory.getFiles(sessionId);
        const artifacts = {};
        for (const f of files) {
          artifacts[f.path] = f.mime === "image/png" ? "<png>" : await f.blob.text();
        }
        window.__e2e = {
          betaLabel,
          consentVisible: i1.consentVisible,
          sessionId,
          paths: files.map((f) => f.path),
          artifacts,
        };
        return "done";
      };
    </script>
  </body>
</html>
